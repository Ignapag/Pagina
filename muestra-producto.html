<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Positivo Hogar</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script src="java.js" defer></script>
    <script src="producto.js?v=11" defer></script>
</head>
<script src="chat-widget.js" defer></script>
<body class="body body_only_product">
    <div id="site-header"></div>

    <button class="only_product_button_back">
        <span class="material-symbols-outlined negro">arrow_back_ios_new</span>
    </button>

    <main class="main only_product_main">
        <div class="only_product_add_container">
            <img src="Gemini_Generated_Image_lhkp2blhkp2blhkp.png" alt="" class="only_product_add main_desktop">
        </div>
        <div class="only_product_container">
            <h2 class="only_product_tittle main_phone"></h2>
            <section class="only_product">

                <!-- Imagen -->
                <div class="grid-item">
                    <img class="only_product_img" src="" alt="">
                </div>

                <!-- Descripción -->
                <div class="grid-item descripcion">
                    <strong class="only_product_description"></strong>
                </div>

                <!-- Características + botones -->
                <div class="grid-item caracteristicas">
                    <h2 class="only_product_tittle main_desktop"></h2>
                    <div>
                        <h3 class="only_product_tittle_secundary">Caracteristicas:</h3>
                        <ul class="only_product_list"></ul>
                    </div>

                    <!-- Desktop: dos botones lado a lado -->
                    <div class="only_product_contact_container main_desktop">
                        <a class="only_product_contact_a whatsapp" data-sucursal="Las Flores">
                            <button class="only_product_contact_button">
                                <img class="contact_wpp_img" src="./whatsapp-logo.png" alt="WA">
                                Las Flores
                            </button>
                        </a>
                        <a class="only_product_contact_a whatsapp" data-sucursal="Mitre">
                            <button class="only_product_contact_button">
                                <img class="contact_wpp_img" src="./whatsapp-logo.png" alt="WA">
                                Mitre
                            </button>
                        </a>
                    </div>
                </div>

            </section>
        </div>

        <!-- Mobile: barra fija abajo con dos botones -->
        <div class="only_product_wpp_bar_mobile main_phone">
            <a class="only_product_wpp_mobile_btn whatsapp" data-sucursal="Las Flores">
                <img src="./whatsapp-logo.png" alt="WA" class="only_product_wpp_mobile_icon">
                <span>Las Flores</span>
            </a>
            <div class="only_product_wpp_mobile_sep"></div>
            <a class="only_product_wpp_mobile_btn whatsapp" data-sucursal="Mitre">
                <img src="./whatsapp-logo.png" alt="WA" class="only_product_wpp_mobile_icon">
                <span>Mitre</span>
            </a>
        </div>

    </main>

    <div id="site-footer"></div>
</body>
</html>
