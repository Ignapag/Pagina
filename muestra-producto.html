<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <!-- SEO: valores base (se actualizan dinámicamente cuando carga el producto) -->
    <title>Producto - Positivo Hogar</title>
    <meta name="description" content="Conocé los detalles del producto. Crédito con tu DNI sin tarjeta de crédito en Positivo Hogar, Wilde.">
    <meta name="robots" content="index, follow">

    <!-- Open Graph base -->
    <meta property="og:type" content="product">
    <meta property="og:site_name" content="Positivo Hogar">
    <meta property="og:title" content="Producto - Positivo Hogar">
    <meta property="og:description" content="Crédito con tu DNI sin tarjeta de crédito. Positivo Hogar, Wilde.">
    <meta property="og:image" content="https://positivohogar.com.ar/banner_principal.png">
    <meta property="og:url" content="https://positivohogar.com.ar/muestra-producto.html">
    <meta property="og:locale" content="es_AR">

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <!-- 
        ACTUALIZACIÓN DINÁMICA DE META TAGS
        Llama a window.actualizarMetaProducto({ nombre, imagen, descripcion, precio })
        desde producto.js una vez que tengas los datos del producto.
    -->
    <script>
        window.actualizarMetaProducto = function({ nombre, imagen, descripcion, precio }) {
            const titulo = nombre + ' - Positivo Hogar';
            const desc   = (descripcion ? descripcion.substring(0, 150) : 'Crédito con tu DNI sin tarjeta de crédito.') + ' | Positivo Hogar, Wilde.';
            const img    = imagen || 'https://positivohogar.com.ar/banner_principal.png';
            const url    = window.location.href;

            // Title
            document.title = titulo;

            // Meta description
            let metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) metaDesc.setAttribute('content', desc);

            // Open Graph
            const setOG = (prop, val) => {
                let tag = document.querySelector(`meta[property="${prop}"]`);
                if (tag) tag.setAttribute('content', val);
            };
            setOG('og:title',       titulo);
            setOG('og:description', desc);
            setOG('og:image',       img);
            setOG('og:url',         url);

            // Schema del producto
            const schema = {
                "@context": "https://schema.org",
                "@type": "Product",
                "name": nombre,
                "image": img,
                "description": descripcion || '',
                "offers": {
                    "@type": "Offer",
                    "price": precio || 0,
                    "priceCurrency": "ARS",
                    "availability": "https://schema.org/InStock",
                    "seller": {
                        "@type": "Store",
                        "name": "Positivo Hogar"
                    }
                }
            };
            let schemaTag = document.getElementById('schema-producto');
            if (!schemaTag) {
                schemaTag = document.createElement('script');
                schemaTag.type = 'application/ld+json';
                schemaTag.id   = 'schema-producto';
                document.head.appendChild(schemaTag);
            }
            schemaTag.textContent = JSON.stringify(schema);
        };
    </script>

    <script src="java.js" defer></script>
    <script src="producto.js?v=12" defer></script>
</head>
<script src="chat-widget.js" defer></script>
<body class="body body_only_product">
    <div id="site-header"></div>

    <button class="only_product_button_back">
        <span class="material-symbols-outlined negro">arrow_back_ios_new</span>
    </button>

    <main class="main only_product_main">
        <div class="only_product_add_container">
            <img src="Gemini_Generated_Image_lhkp2blhkp2blhkp.png" alt="" class="only_product_add main_desktop">
        </div>
        <div class="only_product_container">
            <h2 class="only_product_tittle main_phone"></h2>
            <section class="only_product">

                <!-- Imagen -->
                <div class="grid-item">
                    <img class="only_product_img" src="" alt="">
                </div>

                <!-- Descripción -->
                <div class="grid-item descripcion">
                    <strong class="only_product_description"></strong>
                </div>

                <!-- Características + botones -->
                <div class="grid-item caracteristicas">
                    <h2 class="only_product_tittle main_desktop"></h2>
                    <div>
                        <h3 class="only_product_tittle_secundary">Caracteristicas:</h3>
                        <ul class="only_product_list"></ul>
                    </div>

                    <!-- Desktop: dos botones lado a lado -->
                    <div class="only_product_contact_container main_desktop">
                        <a class="only_product_contact_a whatsapp" data-sucursal="Las Flores">
                            <button class="only_product_contact_button">
                                <img class="contact_wpp_img" src="./whatsapp-logo.png" alt="WA">
                                Las Flores
                            </button>
                        </a>
                        <a class="only_product_contact_a whatsapp" data-sucursal="Mitre">
                            <button class="only_product_contact_button">
                                <img class="contact_wpp_img" src="./whatsapp-logo.png" alt="WA">
                                Mitre
                            </button>
                        </a>
                    </div>
                </div>

            </section>
        </div>

        <!-- Mobile: barra fija abajo con dos botones -->
        <div class="only_product_wpp_bar_mobile main_phone">
            <a class="only_product_wpp_mobile_btn whatsapp" data-sucursal="Las Flores">
                <img src="./whatsapp-logo.png" alt="WA" class="only_product_wpp_mobile_icon">
                <span>Las Flores</span>
            </a>
            <div class="only_product_wpp_mobile_sep"></div>
            <a class="only_product_wpp_mobile_btn whatsapp" data-sucursal="Mitre">
                <img src="./whatsapp-logo.png" alt="WA" class="only_product_wpp_mobile_icon">
                <span>Mitre</span>
            </a>
        </div>

    </main>

    <div id="site-footer"></div>
</body>
</html>
